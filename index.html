<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您有一張專屬祝賀卡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f7f9fc;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .card-container {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            background-color: #fff;
            text-align: center;
            padding-bottom: 24px;
        }
        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            transition: background-color 0.3s;
        }
        .download-btn:active {
            background-color: #005bb5;
        }
        .greeting-text {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="card.jpg" alt="祝賀卡" class="card-image">
        
        <div class="greeting-text">✨ 誠摯的祝福 ✨</div>
        
        <a href="card.jpg" download="2026專屬祝賀卡.jpg" class="download-btn">
            📥 點擊儲存卡片
        </a>
    </div>

</body>
</html>
