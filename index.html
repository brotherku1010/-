<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您有一張專屬畢業祝賀卡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            
            /* --- 底圖設定區 --- */
            background-color: #1a252c;
            /* 預設示範圖：拋向天空的學士帽 */
            background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1080&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* 毛玻璃質感的卡片容器 */
        .card-container {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            overflow: hidden;
            /* 白色半透明背景 + 模糊濾鏡 = 毛玻璃效果 */
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            padding-bottom: 24px;
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            min-height: 200px;
            background-color: #e0e0e0;
        }

        /* 畢業風按鈕：深藍底 + 金色字 */
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #FFD700; 
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #FFD700;
        }

        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(30, 60, 114, 0.3);
        }

        .greeting-text {
            margin-top: 20px;
            font-size: 22px;
            color: #1e3c72;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="cord.jpg" alt="畢業祝賀卡" class="card-image">
        
        <div class="greeting-text">🎓 畢業快樂 🎓</div>
        
        <a href="cord.jpg" download="2026畢業祝賀卡.jpg" class="download-btn">
            📥 點擊儲存卡片
        </a>
    </div>

</body>
</html>
